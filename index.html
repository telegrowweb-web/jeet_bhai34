<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VIP Member Joining – 500 Limited Seats</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      background: #04060a;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 50% 0%,   rgba(255,180,0,0.14)  0%, transparent 55%),
        radial-gradient(ellipse at 20% 100%,  rgba(255,100,0,0.10)  0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%,  rgba(200,0,255,0.08)  0%, transparent 50%);
    }

    .texture {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,180,0,0.055) 1px, transparent 1px);
      background-size: 20px 20px;
      animation: texDrift 24s linear infinite;
    }
    @keyframes texDrift { 0%{background-position:0 0} 100%{background-position:20px 20px} }

    .scan {
      position: fixed; left:0; right:0; height:1px;
      background: linear-gradient(90deg, transparent, rgba(255,180,0,0.5), transparent);
      z-index:0; pointer-events:none;
      animation: scanMove 9s linear infinite;
    }
    @keyframes scanMove { 0%{top:-2px;opacity:0;} 5%{opacity:1;} 95%{opacity:.25;} 100%{top:100%;opacity:0;} }

    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, #ff6b00, #ffb700, #ff6b00, #ffd600, #ff6b00);
      background-size: 300% auto;
      animation: barFlow 3s linear infinite; z-index: 100;
    }
    @keyframes barFlow { 0%{background-position:0% center} 100%{background-position:300% center} }

    .page {
      position: relative; z-index: 1;
      height: 100vh; width: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 18px 20px 22px;
    }

    .top-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,180,0,0.12);
      border: 1px solid rgba(255,180,0,0.30);
      border-radius: 999px; padding: 5px 16px;
      font-size: 9.5px; font-weight: 700;
      letter-spacing: .22em; color: #ffd600;
      text-transform: uppercase;
      margin-bottom: 14px;
      animation: fadeUp .4s ease both;
      white-space: nowrap;
    }
    .bd { width:6px; height:6px; border-radius:50%; background:#ffd600; box-shadow:0 0 8px #ffd600; animation:bdPulse 1.4s ease-in-out infinite; flex-shrink:0; }
    @keyframes bdPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.7)} }

    .poster-wrap {
      width: 100%; max-width: 320px;
      border-radius: 16px; overflow: hidden;
      border: 2px solid rgba(255,180,0,0.30);
      box-shadow:
        0 0 0 1px rgba(255,180,0,0.10),
        0 8px 40px rgba(255,140,0,0.30),
        0 0 80px rgba(255,100,0,0.12);
      animation: fadeUp .4s .06s ease both, posterGlow 3s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes posterGlow {
      0%,100% { box-shadow: 0 0 0 1px rgba(255,180,0,.10), 0 8px 40px rgba(255,140,0,.30), 0 0 80px rgba(255,100,0,.12); }
      50%      { box-shadow: 0 0 0 1px rgba(255,180,0,.20), 0 12px 56px rgba(255,140,0,.50), 0 0 100px rgba(255,100,0,.22); }
    }
    .poster-wrap img { width: 100%; height: auto; display: block; object-fit: cover; }

    .vip-text {
      text-align: center;
      margin-top: 16px;
      animation: fadeUp .4s .14s ease both;
    }
    .vip-text h2 {
      font-size: clamp(18px, 5vw, 28px);
      font-weight: 900; letter-spacing: .06em;
      background: linear-gradient(90deg, #ff8c00, #ffd600, #ffb700);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px rgba(255,180,0,.5));
      line-height: 1.15;
    }
    .vip-text p {
      font-size: clamp(11px, 2.5vw, 14px);
      font-weight: 600; color: rgba(255,255,255,.50);
      letter-spacing: .08em; margin-top: 4px;
      text-transform: uppercase;
    }
    .vip-text p span { color: #ff6b00; font-weight: 800; }

    .seat-row {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,100,0,.10);
      border: 1px solid rgba(255,100,0,.25);
      border-radius: 8px; padding: 7px 18px;
      margin-top: 12px;
      animation: fadeUp .4s .22s ease both;
      font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,.45); letter-spacing: .06em;
      white-space: nowrap;
    }
    .seat-row span { color: #ff8c00; font-weight: 900; font-size: 13px; }
    .fire { font-size: 14px; }

    /* ── CTA BUTTON — FIXED ONE LINE ── */
    .cta-wrap {
      width: 100%; max-width: 320px;
      margin-top: 14px;
      animation: fadeUp .4s .30s ease both;
    }
    .btn {
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      width: 100%;
      padding: 0 20px;
      height: 52px;
      border-radius: 12px;
      background: linear-gradient(135deg, #b45309, #d97706, #fbbf24, #fde68a);
      background-size: 200% auto;
      color: #030207;
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: clamp(12px, 3.8vw, 15px);
      letter-spacing: .10em;
      text-transform: uppercase;
      text-decoration: none;
      border: none; cursor: pointer;
      box-shadow: 0 6px 30px rgba(255,180,0,.50);
      white-space: nowrap;
      animation: btnPulse 2s ease-in-out infinite, gSlide 3s linear infinite;
    }
    .btn::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
      transform:translateX(-100%);
      animation:shimmer 2.4s ease-in-out infinite;
    }
    @keyframes shimmer { 0%{transform:translateX(-100%)} 55%,100%{transform:translateX(100%)} }
    @keyframes btnPulse {
      0%,100%{transform:scale(1);   box-shadow:0 6px 30px rgba(255,180,0,.50);}
      50%    {transform:scale(1.04);box-shadow:0 10px 44px rgba(255,180,0,.80);}
    }
    @keyframes gSlide { 0%{background-position:0% center} 100%{background-position:200% center} }

    .btn-inner {
      position: relative; z-index: 1;
      display: flex; align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .tg { width: 18px; height: 18px; flex-shrink: 0; }
    .tg path { fill: #030207; }

    .credit {
      position: fixed; bottom: 9px; left:0; right:0;
      text-align:center; font-size:11px;
      color:rgba(255,255,255,.18); z-index:100; letter-spacing:.03em;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── PHONE ≤ 480px ── */
    @media (max-width:480px) {
      .page { padding: 12px 16px 18px; }
      .top-badge { font-size: 8px; padding: 4px 12px; margin-bottom: 10px; letter-spacing: .15em; }
      .poster-wrap { max-width: 100%; border-radius: 12px; }
      .vip-text { margin-top: 11px; }
      .vip-text h2 { font-size: clamp(16px, 5vw, 20px); }
      .vip-text p { font-size: 10.5px; margin-top: 3px; }
      .seat-row { margin-top: 9px; padding: 6px 14px; font-size: 10px; }
      .seat-row span { font-size: 11.5px; }
      .cta-wrap { margin-top: 11px; max-width: 100%; }
      .btn {
        height: 50px;
        font-size: clamp(11px, 3.5vw, 13px);
        letter-spacing: .08em;
        border-radius: 10px;
        padding: 0 16px;
      }
      .btn-inner { gap: 7px; }
      .tg { width: 16px; height: 16px; }
      .credit { font-size: 10px; bottom: 5px; }
    }

    @media (max-width: 370px) {
      .btn { height: 48px; font-size: 11px; letter-spacing: .06em; padding: 0 12px; }
      .tg { width: 15px; height: 15px; }
      .btn-inner { gap: 6px; }
      .top-badge { font-size: 7.5px; letter-spacing: .12em; }
    }

    /* ── LAPTOP ≥ 768px ── */
    @media (min-width:768px) {
      .top-badge { font-size:10.5px; padding:6px 18px; margin-bottom:18px; }
      .poster-wrap { max-width:380px; border-radius:18px; }
      .vip-text { margin-top:18px; }
      .vip-text h2 { font-size:30px; }
      .vip-text p  { font-size:14px; margin-top:5px; }
      .seat-row { margin-top:14px; padding:8px 22px; font-size:12px; }
      .seat-row span { font-size:14px; }
      .cta-wrap { margin-top:16px; max-width:380px; }
      .btn { height:56px; font-size:16px; letter-spacing:.12em; padding:0 34px; border-radius:14px; }
    }
  </style>
</head>
<body>

  <div class="top-bar"></div>
  <div class="bg"></div>
  <div class="texture"></div>
  <div class="scan"></div>

  <main class="page">

    <div class="top-badge">
      <div class="bd"></div>
      🔥 &nbsp; Exclusive VIP Offer &nbsp; 🔥
    </div>

    <div class="poster-wrap">
      <img
        src="https://academylinkx.site/wp-content/uploads/2026/04/TRADING-2026-04-21T151307.948.jpg"
        alt="VIP Trading Poster"
        onerror="this.style.background='#1a1200';this.style.height='200px';"
      />
    </div>

    <div class="vip-text">
      <h2>VIP Member Joining</h2>
      <p>Only <span>500 Limited</span> Seats Available!</p>
    </div>

    <div class="cta-wrap">
      <a href="https://t.me/+Zk-wXpRp-Mo4YmQ1" target="_blank" rel="noopener" class="btn">
        <span class="btn-inner">
          <svg class="tg" viewBox="0 0 24 24" fill="none">
            <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.069l-2.04 9.608c-.15.673-.546.837-1.107.52l-3.062-2.255-1.478 1.423c-.164.164-.3.3-.615.3l.219-3.108 5.655-5.108c.246-.218-.053-.34-.38-.12L7.27 14.078l-3.013-.94c-.655-.204-.668-.655.137-.969l11.753-4.53c.546-.2 1.024.133.847.93l-.432-.5z"/>
          </svg>
          Join VIP Now — Telegram
        </span>
      </a>
    </div>

  </main>

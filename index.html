<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JEET BHAI — IPL Predictions</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

/* ══════════════════════════════════
   NEW THEME: Deep Navy + Electric Blue + Cyan
══════════════════════════════════ */
:root{
  --bg:        #020B18;
  --bg2:       #041022;
  --accent1:   #00C6FF;   /* cyan */
  --accent2:   #0072FF;   /* electric blue */
  --accent3:   #7B2FFF;   /* violet */
  --tg:        #229ED9;   /* telegram blue */
  --tg-dark:   #1A7FAD;
  --gold:      #FFD166;
  --red:       #EF233C;
  --white:     #FFFFFF;
  --muted:     rgba(255,255,255,.42);
  --card-bg:   rgba(4,16,34,.85);
  --border:    rgba(0,198,255,.12);
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── Canvas ── */
#bgCanvas{position:fixed;inset:0;z-index:0}

/* ── Noise overlay ── */
.noise{
  position:fixed;inset:0;z-index:1;opacity:.025;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;
}

/* ── Page layout ── */
.page{
  position:relative;z-index:2;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 18px 0;
}
.hero{width:100%;max-width:440px;display:flex;flex-direction:column;align-items:center}

/* ══════════════════════════════════
   TOP BADGE
══════════════════════════════════ */
.badge{
  display:flex;align-items:center;gap:10px;
  margin-bottom:26px;
  opacity:0;animation:revUp .55s .05s ease forwards;
}
.bline{width:32px;height:1px}
.bline.l{background:linear-gradient(90deg,transparent,var(--accent1))}
.bline.r{background:linear-gradient(90deg,var(--accent1),transparent)}
.btxt{
  font-size:10px;font-weight:600;letter-spacing:4px;
  color:var(--accent1);text-transform:uppercase;white-space:nowrap;
}

/* ══════════════════════════════════
   LOGO
══════════════════════════════════ */
.logo-zone{
  position:relative;
  width:clamp(118px,30vw,148px);
  height:clamp(118px,30vw,148px);
  margin-bottom:22px;
  opacity:0;animation:revScale .8s .2s cubic-bezier(.34,1.56,.64,1) forwards;
}
.glow{
  position:absolute;inset:-28px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,198,255,.22) 0%,transparent 65%);
  animation:glowPulse 2.8s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}

.orb1{
  position:absolute;inset:-9px;border-radius:50%;
  border:1.5px solid transparent;
  background:
    linear-gradient(var(--bg),var(--bg)) padding-box,
    conic-gradient(from 0deg,var(--accent1) 0deg,transparent 80deg,var(--accent2) 180deg,transparent 260deg,var(--accent1) 360deg) border-box;
  animation:spin 6s linear infinite;
}
.orb2{
  position:absolute;inset:-17px;border-radius:50%;
  border:1px solid transparent;
  background:
    linear-gradient(var(--bg),var(--bg)) padding-box,
    conic-gradient(from 220deg,transparent 0deg,rgba(123,47,255,.6) 80deg,transparent 160deg,transparent 300deg,rgba(0,198,255,.4) 340deg,transparent 360deg) border-box;
  animation:spin 11s linear infinite reverse;
  opacity:.6;
}
@keyframes spin{to{transform:rotate(360deg)}}

.logo-frame{
  position:relative;z-index:2;width:100%;height:100%;
  border-radius:50%;overflow:hidden;
  border:2px solid rgba(0,198,255,.3);
  box-shadow:0 0 32px rgba(0,198,255,.15),0 0 0 1px rgba(0,198,255,.07);
  background:#04162A;
}
.logo-frame img{width:100%;height:100%;object-fit:cover;display:block}
.logo-fb{
  display:none;width:100%;height:100%;
  align-items:center;justify-content:center;
  font-family:'Anton',sans-serif;font-size:38px;
  color:var(--accent1);
  background:radial-gradient(circle at 40% 40%,#0a1f38,#020B18);
}

/* ══════════════════════════════════
   NAME
══════════════════════════════════ */
.brand-name{
  font-family:'Anton',sans-serif;
  font-size:clamp(44px,13.5vw,68px);
  letter-spacing:.03em;line-height:.9;
  text-align:center;
  background:linear-gradient(155deg,#E0F7FF 0%,var(--accent1) 30%,var(--accent2) 55%,var(--accent3) 80%,var(--accent1) 100%);
  background-size:200% 200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 22px rgba(0,198,255,.3));
  opacity:0;animation:revUp .7s .42s ease forwards, nameShift 5s ease infinite;
  margin-bottom:4px;
}
@keyframes nameShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.brand-sub{
  font-size:clamp(9px,2.6vw,11px);font-weight:500;
  letter-spacing:5px;color:rgba(0,198,255,.5);
  text-transform:uppercase;text-align:center;
  opacity:0;animation:revUp .7s .52s ease forwards;
  margin-bottom:20px;
}

/* ── Sub count ── */
.sub-pill{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,198,255,.06);
  border:1px solid rgba(0,198,255,.16);
  border-radius:100px;padding:6px 18px;
  margin-bottom:26px;
  opacity:0;animation:revUp .7s .62s ease forwards;
}
.ldot{
  width:7px;height:7px;border-radius:50%;
  background:#00ff88;box-shadow:0 0 10px #00ff88;
  animation:ldPulse 1.4s ease-in-out infinite;
}
@keyframes ldPulse{0%,100%{box-shadow:0 0 6px #00ff88}50%{box-shadow:0 0 16px #00ff88,0 0 32px rgba(0,255,136,.3)}}
.sub-txt{font-size:12px;font-weight:500;letter-spacing:1.5px;color:rgba(255,255,255,.6);text-transform:uppercase}
.sub-num{color:var(--accent1);font-weight:700}

/* ══════════════════════════════════
   FEATURE CARDS
══════════════════════════════════ */
.features{
  display:grid;grid-template-columns:1fr 1fr;gap:9px;
  width:100%;margin-bottom:26px;
  opacity:0;animation:revUp .7s .72s ease forwards;
}
.fc{
  background:rgba(0,198,255,.04);
  border:1px solid rgba(0,198,255,.09);
  border-radius:13px;padding:13px 13px;
  display:flex;align-items:center;gap:10px;
  transition:background .2s,border-color .25s,transform .2s;
  cursor:default;
}
.fc:hover{
  background:rgba(0,198,255,.09);
  border-color:rgba(0,198,255,.25);
  transform:translateY(-2px);
}
.fi{font-size:18px;flex-shrink:0}
.ft{font-size:clamp(10px,2.7vw,12px);font-weight:500;color:rgba(255,255,255,.62);line-height:1.3}

/* ══════════════════════════════════
   TELEGRAM CTA BUTTON  ← NEW
══════════════════════════════════ */
.cta-wrap{
  width:100%;margin-bottom:14px;
  opacity:0;animation:revUp .7s .85s ease forwards;
}

.cta{
  display:flex;align-items:center;justify-content:center;gap:13px;
  width:100%;
  padding:clamp(15px,4.5vw,20px) 24px;
  background:linear-gradient(130deg,#00C6FF 0%,#0072FF 50%,#7B2FFF 100%);
  background-size:200% 200%;
  color:#fff;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(19px,5.5vw,25px);
  letter-spacing:3px;
  text-decoration:none;
  border-radius:16px;border:none;cursor:pointer;
  position:relative;overflow:hidden;
  box-shadow:
    0 0 0 0 rgba(0,198,255,.5),
    0 8px 28px rgba(0,114,255,.4),
    0 1px 0 rgba(255,255,255,.2) inset;
  /* ZOOM PULSE ANIMATION */
  animation:
    gradDrift 4s ease infinite,
    zoomPulse 2s ease-in-out infinite;
  transition:transform .15s,box-shadow .15s;
}

/* zoom in/out breathing animation */
@keyframes zoomPulse{
  0%   { transform:scale(1);    box-shadow:0 0 0 0 rgba(0,198,255,.45), 0 8px 28px rgba(0,114,255,.4); }
  50%  { transform:scale(1.035);box-shadow:0 0 0 12px rgba(0,198,255,.0), 0 12px 38px rgba(0,114,255,.55); }
  100% { transform:scale(1);    box-shadow:0 0 0 0 rgba(0,198,255,.45), 0 8px 28px rgba(0,114,255,.4); }
}

@keyframes gradDrift{
  0%   {background-position:0% 50%}
  50%  {background-position:100% 50%}
  100% {background-position:0% 50%}
}

/* Shine sweep */
.cta::after{
  content:'';position:absolute;top:0;left:-100%;
  width:55%;height:100%;
  background:linear-gradient(105deg,transparent 20%,rgba(255,255,255,.28) 50%,transparent 80%);
  animation:shine 2.6s ease-in-out infinite;
}
@keyframes shine{0%{left:-100%}55%{left:150%}100%{left:150%}}

/* Stop zoom on hover, show scale-up instead */
.cta:hover{
  animation:gradDrift 4s ease infinite;
  transform:scale(1.04) translateY(-2px);
  box-shadow:0 0 0 6px rgba(0,198,255,.18),0 16px 48px rgba(0,114,255,.55);
}
.cta:active{
  animation:gradDrift 4s ease infinite;
  transform:scale(.98);
}

/* ── Telegram SVG icon ── */
.tg-icon{
  width:26px;height:26px;flex-shrink:0;
  filter:drop-shadow(0 0 6px rgba(255,255,255,.4));
}

.cta-arrow{
  font-size:15px;margin-left:2px;
  animation:arrowBounce 1.2s ease-in-out infinite;
}
@keyframes arrowBounce{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}

/* ══════════════════════════════════
   CONTACT
══════════════════════════════════ */
.contact{
  text-align:center;
  font-size:clamp(11px,3vw,13px);
  color:rgba(255,255,255,.3);
  margin-bottom:22px;letter-spacing:.3px;
  opacity:0;animation:revUp .7s .96s ease forwards;
}
.contact a{color:rgba(100,198,255,.7);text-decoration:none;font-weight:500;transition:color .2s}
.contact a:hover{color:var(--accent1)}

/* ══════════════════════════════════
   STATS STRIP
══════════════════════════════════ */
.stats{
  width:100%;
  display:grid;grid-template-columns:repeat(3,1fr);
  border:1px solid rgba(0,198,255,.08);
  border-radius:13px;overflow:hidden;
  margin-bottom:8px;
  opacity:0;animation:revUp .7s 1.04s ease forwards;
}
.si{padding:14px 8px;text-align:center;position:relative}
.si:not(:last-child)::after{
  content:'';position:absolute;right:0;top:18%;bottom:18%;
  width:1px;background:rgba(0,198,255,.1);
}
.si:nth-child(2){background:rgba(0,198,255,.04)}
.sv{
  font-family:'Anton',sans-serif;
  font-size:clamp(20px,6vw,28px);
  background:linear-gradient(155deg,#E0F7FF,var(--accent1));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;margin-bottom:3px;
}
.sl{font-size:clamp(9px,2.3vw,11px);color:rgba(255,255,255,.28);letter-spacing:1.5px;text-transform:uppercase;font-weight:500}

/* ══════════════════════════════════
   FOOTER
══════════════════════════════════ */
.footer{
  width:100%;max-width:440px;
  padding:18px 16px 28px;text-align:center;
  opacity:0;animation:revUp .7s 1.12s ease forwards;
}
.footer-pill{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.06);
  border-radius:100px;padding:7px 18px;
}
.ft2{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:.4px}
.footer a{color:rgba(0,198,255,.55);text-decoration:none;font-weight:500;transition:color .2s}
.footer a:hover{color:var(--accent1)}

/* ══════════════════════════════════
   KEYFRAMES
══════════════════════════════════ */
@keyframes revUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes revScale{from{opacity:0;transform:scale(.65)}to{opacity:1;transform:scale(1)}}

/* ── Mobile ── */
@media(max-width:340px){.features{grid-template-columns:1fr}}
</style>
</head>

<script>
/* ── Background: Deep space particle field with electric nebula ── */
(function(){
  const cv = document.getElementById('bgCanvas');
  const ctx = cv.getContext('2d');
  let W, H, pts = [], mx = -999, my = -999;

  function resize(){
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
  }
  window.addEventListener('resize', resize); resize();
  window.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
  window.addEventListener('touchmove', e => { mx=e.touches[0].clientX; my=e.touches[0].clientY; },{passive:true});

  /* colour pools — cyan / blue / violet */
  const COLS = [
    'rgba(0,198,255,',
    'rgba(0,114,255,',
    'rgba(123,47,255,',
    'rgba(0,255,180,',
  ];

  function Pt(){
    this.reset = function(){
      this.x  = Math.random()*W;
      this.y  = Math.random()*H;
      this.r  = Math.random()*1.6+.3;
      this.vy = -(Math.random()*.35+.06);
      this.vx = (Math.random()-.5)*.2;
      this.col= COLS[Math.floor(Math.random()*COLS.length)];
      this.a  = Math.random()*.45+.08;
    };
    this.reset();
    this.y = Math.random()*H;
  }

  for(let i=0;i<100;i++) pts.push(new Pt());

  /* connection lines between nearby particles */
  function lines(){
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<110){
          ctx.beginPath();
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(0,198,255,${.06*(1-d/110)})`;
          ctx.lineWidth=.5;
          ctx.stroke();
        }
      }
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    /* atmospheric radial gradient */
    const g = ctx.createRadialGradient(W/2, 0, 0, W/2, H*.55, H*.95);
    g.addColorStop(0,   'rgba(0,114,255,.08)');
    g.addColorStop(.35, 'rgba(2,11,24,.0)');
    g.addColorStop(1,   'rgba(123,47,255,.05)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    /* extra glow pools */
    const g2 = ctx.createRadialGradient(W*.15, H*.3, 0, W*.15, H*.3, W*.35);
    g2.addColorStop(0,'rgba(0,198,255,.06)');
    g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g2; ctx.fillRect(0,0,W,H);

    const g3 = ctx.createRadialGradient(W*.85, H*.7, 0, W*.85, H*.7, W*.3);
    g3.addColorStop(0,'rgba(123,47,255,.05)');
    g3.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g3; ctx.fillRect(0,0,W,H);

    lines();

    pts.forEach(p => {
      const dx=mx-p.x, dy=my-p.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<80){ p.vx-=(dx/d)*.25; p.vy-=(dy/d)*.25; }
      p.x+=p.vx; p.y+=p.vy; p.vx*=.98;
      if(p.y<-5) p.reset();
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.col+p.a+')';
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
